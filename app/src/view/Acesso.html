<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Financeiro - Login e Cadastro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background:
          linear-gradient(rgba(0, 0, 1, 1), rgba(10, 20, 30, 0.7)),
          url("assets/Img/cartao.jpg") no-repeat center center/cover;
        position: relative;
        overflow: hidden;
        perspective: 2000px;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 420px;
        height: 620px;
        z-index: 2;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
      }

      .container.rotate {
        transform: rotateY(180deg);
      }

      .form-box {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: 40px;
        background: rgba(255, 255, 255, 0.98);
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .register-box {
        transform: rotateY(180deg);
      }

      h2 {
        color: #1e293b;
        font-size: 2.2rem;
        text-align: center;
        margin-bottom: 10px;
        font-weight: 800;
      }

      .subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .input-group {
        position: relative;
        margin-bottom: 15px;
      }

      .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 5px;
        margin-left: 5px;
      }

      .input-group input {
        width: 100%;
        padding: 14px 16px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        font-size: 15px;
        transition: 0.3s;
      }

      .input-group input:focus {
        border-color: #2563eb;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      }

      .toggle-password {
        position: absolute;
        right: 15px;
        top: 38px;
        cursor: pointer;
        width: 20px;
        opacity: 0.5;
      }

      .btn {
        width: 100%;
        height: 54px;
        background: #2563eb;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        transition: 0.3s;
        margin-top: 15px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
      }

      .footer-text {
        color: #64748b;
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
      }

      .footer-text a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      /* Ajustes finos para o Modal */
      .modal-content {
        border-radius: 20px;
        border: none;
      }
      .modal-header {
        border-bottom: none;
        padding-bottom: 0;
      }
      .modal-footer {
        border-top: none;
      }
    </style>
  </head>
  <body>

    <div class="modal fade" id="modalErro" tabindex="-1" aria-labelledby="modalErroLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
          <div class="modal-header justify-content-center">
            <h5 class="modal-title fw-bold text-danger" id="modalErroLabel">Acesso Negado ⚠️</h5>
          </div>
          <div class="modal-body">
            <p class="text-secondary">E-mail ou senha incorretos. Por favor, verifique seus dados e tente novamente.</p>
          </div>
          <div class="modal-footer justify-content-center">
            <button type="button" class="btn btn-primary w-50" data-bs-dismiss="modal">Entendido</button>
          </div>
        </div>
      </div>
    </div>

    <div class="container" id="card">
      <div class="form-box login-box">
        <form action="/login" method="POST">
          <h2>Olá de volta!</h2>
          <p class="subtitle">Acesse sua conta para continuar</p>

          <div class="input-group">
            <label>E-mail / Usuário</label>
            <input type="text" name="email" placeholder="Digite seu e-mail" required />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input type="password" name="senha" id="loginPass" placeholder="••••••••" required />
            <img src="https://cdn-icons-png.flaticon.com/512/633/633633.png" class="toggle-password" onclick="MostrarSenha('loginPass', this)" />
          </div>

          <button type="submit" class="btn">Entrar na Conta</button>

          <p class="footer-text">
            Não tem uma conta? <a onclick="AlternarFormulario()">Cadastre-se</a>
          </p>
        </form>
      </div>

      <div class="form-box register-box">
        <form action="/cadastrar" method="POST">
          <h2 style="color: #059669;">Nova Conta</h2>
          <p class="subtitle">Junte-se à nossa comunidade</p>

          <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" name="nome" placeholder="Ex: Alex Smith" required />
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="seu@email.com" required />
          </div>

          <div class="input-group">
            <label>Sua Senha</label>
            <input type="password" name="senha" id="regPass" placeholder="Mínimo 8 caracteres" required />
            <img src="https://cdn-icons-png.flaticon.com/512/633/633633.png" class="toggle-password" onclick="MostrarSenha('regPass', this)" />
          </div>

          <button type="submit" class="btn" style="background: #10b981;">Criar minha Conta</button>

          <p class="footer-text">
            Já é membro? <a onclick="AlternarFormulario()" style="color: #10b981;">Fazer login</a>
          </p>
        </form>
      </div>
    </div>

    <script>
      // Lógica para abrir o modal se houver erro na URL
      window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("erro") === "1") {
          const modalElement = document.getElementById("modalErro");
          const minhaModal = new bootstrap.Modal(modalElement);
          minhaModal.show();
          
          // Limpa o parâmetro da URL para não reabrir ao atualizar a página
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      });

      function AlternarFormulario() {
        const container = document.getElementById("card");
        container.classList.toggle("rotate");
      }

      function MostrarSenha(inputId, icone) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          icone.src = "https://cdn-icons-png.flaticon.com/512/633/633655.png";
        } else {
          input.type = "password";
          icone.src = "https://cdn-icons-png.flaticon.com/512/633/633633.png";
        }
      }
    </script>
  </body>
</html>
