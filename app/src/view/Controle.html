<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Admin | Novo Lançamento</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --accent: #6366f1;
            --bg-canvas: #f8fafc;
            --sidebar-bg: #0f172a;
            --success: #10b981;
            --danger: #f43f5e;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-canvas);
            color: #1e293b;
            min-height: 100vh;
            margin: 0;
            display: flex;
            overflow-x: hidden;
        }

        /* Efeito de Glow de Fundo Dinâmico */
        .bg-glow {
            position: fixed;
            top: 0; right: 0;
            width: 600px; height: 600px;
            filter: blur(120px);
            opacity: 0.12;
            z-index: -1;
            transition: var(--transition);
            border-radius: 50%;
        }

        /* Sidebar Desktop */
        .sidebar {
            width: 90px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 0;
            position: fixed;
            height: 100vh;
            z-index: 1050;
            transition: var(--transition);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        .nav-item {
            width: 54px; height: 54px;
            border-radius: 16px;
            display: grid; place-items: center;
            color: #64748b;
            margin-bottom: 1.2rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 12px 20px rgba(99, 102, 241, 0.35); }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1100;
            padding: 0 1.5rem;
            align-items: center;
            justify-content: space-between;
        }

        /* Container Principal */
        .main-content {
            margin-left: 90px;
            width: calc(100% - 90px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            transition: var(--transition);
        }

        .form-container {
            max-width: 540px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 3rem;
            border: 1px solid white;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.08);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Seletor de Tipo */
        .type-selector {
            background: #f1f5f9;
            padding: 8px;
            border-radius: 24px;
            display: flex;
            margin-bottom: 2rem;
        }

        .type-btn {
            flex: 1;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-in.active { background: white; color: var(--success); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        .btn-out.active { background: white; color: var(--danger); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        .type-btn:not(.active) { color: #94a3b8; background: transparent; }

        /* Badge Identificador */
        #badgeTipo {
            font-size: 0.65rem;
            letter-spacing: 1px;
            padding: 6px 16px;
            font-weight: 800;
            margin-bottom: 10px;
            display: inline-block;
        }

        /* Inputs */
        .value-wrapper {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .value-input {
            font-size: 4rem;
            font-weight: 800;
            border: none;
            background: transparent;
            width: 250px;
            transition: var(--transition);
            letter-spacing: -2px;
            text-align: center;
        }

        .value-input:focus { outline: none; }

        .form-control-custom {
            width: 100%;
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 18px 24px;
            font-weight: 600;
            transition: var(--transition);
        }

        .form-control-custom:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            transition: var(--transition);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; align-items: flex-start; padding: 6rem 2rem; }
            .sidebar.show { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; width: 100%; padding-top: 90px; }
            .form-container { padding: 2rem; background: transparent; box-shadow: none; }
            .value-input { font-size: 3rem; width: 180px; }
        }
    </style>
</head>
<body>

<div class="bg-glow" id="dynamicGlow"></div>

<header class="mobile-header">
    <div class="d-flex align-items-center gap-2">
        <div style="width: 35px; height: 35px; background: var(--accent); border-radius: 10px; display: grid; place-items: center;">
            <i class="bi bi-cpu-fill text-white"></i>
        </div>
        <span class="text-white fw-800 fs-5">Ultra Finance</span>
    </div>
    <button class="btn p-0 text-white" onclick="toggleMenu()">
        <i class="bi bi-list fs-1" id="menuIcon"></i>
    </button>
</header>

<aside class="sidebar" id="mainSidebar">
    <div class="mb-5 d-none d-md-block">
        <div style="width: 50px; height: 50px; background: var(--accent); border-radius: 14px; display: grid; place-items: center;">
            <i class="bi bi-cpu-fill text-white fs-4"></i>
        </div>
    </div>
    <a href="/dashboard" class="nav-item" title="Dashboard"><i class="bi bi-grid-1x2-fill fs-5"></i></a>
    <a href="#" class="nav-item active" title="Novo Lançamento"><i class="bi bi-plus-lg fs-5"></i></a>
    <a href="/relatorios" class="nav-item mt-auto" title="Configurações"><i class="bi bi-gear-fill fs-5"></i></a>
</aside>

<main class="main-content">
    <div class="form-container">
        <div class="text-center mb-4">
            <h3 class="fw-800 mb-1">Novo Lançamento</h3>
            <p class="text-muted small">Preencha os dados abaixo para registrar.</p>
        </div>

        <form id="financeForm" method="POST" action="http://localhost:3000/controle/novolancamento">
            
            <input type="hidden" name="tipo_movimentacao" id="tipoMovimentacao" value="in">

            <div class="type-selector">
                <button type="button" class="type-btn btn-in active" onclick="updateUI('in')">
                    <i class="bi bi-arrow-down-left-circle-fill"></i> Receita
                </button>
                <button type="button" class="type-btn btn-out" onclick="updateUI('out')">
                    <i class="bi bi-arrow-up-right-circle-fill"></i> Despesa
                </button>
            </div>

            <div class="value-wrapper">
                <div class="text-center">
                    <span id="badgeTipo" class="badge rounded-pill bg-success text-uppercase">Receita</span>
                </div>
                <div class="d-flex align-items-center justify-content-center">
                    <span class="fs-2 fw-800 me-2" id="currency">R$</span>
                    <input type="number" name="valor" step="0.01" class="value-input" id="amount" placeholder="0,00" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="text-muted fw-700 small text-uppercase mb-2 d-block">O que é este lançamento?</label>
                <input type="text" name="descricao" class="form-control-custom" placeholder="Ex: Pagamento Cliente X" required>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="text-muted fw-700 small text-uppercase mb-2 d-block">Data</label>
                    <input type="date" name="data" class="form-control-custom" id="dateInput">
                </div>
                <div class="col-md-6">
                    <label class="text-muted fw-700 small text-uppercase mb-2 d-block">Categoria</label>
                    <select name="categoria" class="form-control-custom">
                        <option value="vendas">Vendas / Serviços</option>
                        <option value="infra">Infraestrutura</option>
                        <option value="pessoal">Pessoal</option>
                        <option value="marketing">Marketing</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="mainButton">
                <i class="bi bi-check-lg fs-4"></i>
                Finalizar Registro
            </button>
        </form>
    </div>
</main>

<script>
    document.getElementById('dateInput').valueAsDate = new Date();

    function updateUI(mode) {
        const btnIn = document.querySelector('.btn-in');
        const btnOut = document.querySelector('.btn-out');
        const amount = document.getElementById('amount');
        const currency = document.getElementById('currency');
        const button = document.getElementById('mainButton');
        const glow = document.getElementById('dynamicGlow');
        const badge = document.getElementById('badgeTipo');
        const inputHidden = document.getElementById('tipoMovimentacao');

        // Atualiza o valor para o backend
        inputHidden.value = mode;

        if(mode === 'in') {
            btnIn.classList.add('active');
            btnOut.classList.remove('active');
            
            amount.style.color = 'var(--success)';
            currency.style.color = 'var(--success)';
            button.style.background = 'var(--success)';
            glow.style.background = 'var(--success)';
            glow.style.top = '0';
            glow.style.right = '0';
            
            badge.innerText = 'Receita';
            badge.className = 'badge rounded-pill bg-success text-uppercase';
            button.innerHTML = '<i class="bi bi-check-lg fs-4"></i> Finalizar Receita';
        } else {
            btnOut.classList.add('active');
            btnIn.classList.remove('active');
            
            amount.style.color = 'var(--danger)';
            currency.style.color = 'var(--danger)';
            button.style.background = 'var(--danger)';
            glow.style.background = 'var(--danger)';
            glow.style.top = '20%';
            glow.style.right = '10%';
            
            badge.innerText = 'Despesa';
            badge.className = 'badge rounded-pill bg-danger text-uppercase';
            button.innerHTML = '<i class="bi bi-check-lg fs-4"></i> Finalizar Despesa';
        }
    }

    function toggleMenu() {
        const sidebar = document.getElementById('mainSidebar');
        sidebar.classList.toggle('show');
    }

    // Inicialização
    updateUI('in');
</script>

</body>
</html>
